server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: http://order-service:8081
          predicates:
            - Path=/orders/**
        - id: payment-service
          uri: http://payment-service:8082
          predicates:
            - Path=/payments/**
        - id: inventory-service
          uri: http://inventory-service:8083
          predicates:
            - Path=/inventory/**
        - id: shipping-service
          uri: http://shipping-service:8084
          predicates:
            - Path=/shipping/**
